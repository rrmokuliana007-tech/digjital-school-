<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shkolla Digjitale - Game Hub</title>
<style>
:root{--gold:#f0b90b;--orange:#ff6b35;--cyan:#00d4ff;--purple:#a855f7;--pink:#ec4899;--green:#10b981;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#020010;color:#f0e6ff;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 30% 20%,rgba(100,60,255,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 60%,rgba(0,180,255,.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(255,100,180,.06) 0%,transparent 40%),radial-gradient(ellipse at 20% 70%,rgba(0,200,255,.05) 0%,transparent 50%);pointer-events:none;z-index:0}

/* ===== SCREENS (SINGLE-PAGE HUB) ===== */
.screen{display:none;min-height:100vh;padding:20px;position:relative;z-index:1}
.screen.active{display:flex;flex-direction:column;align-items:center}

/* ===== HUB ===== */
.hub-top{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:center;margin:10px 0}
.stat-badge{background:#141a2e;border:1px solid #2a3350;border-radius:12px;padding:10px 20px;display:flex;align-items:center;gap:8px;font-weight:700}
.stat-badge .sv{color:#f0b90b;font-size:1.2rem}
.level-bar{background:#2a3350;border-radius:10px;height:12px;width:200px;overflow:hidden}
.level-bar-fill{height:100%;background:linear-gradient(90deg,#f0b90b,#ff6b35,#ec4899);border-radius:10px;transition:width .5s}

.diff-picker{display:flex;gap:8px;justify-content:center;margin:10px 0}
.diff-btn{padding:8px 20px;border-radius:20px;border:2px solid #2a3350;background:transparent;color:#8899aa;cursor:pointer;font-weight:700;font-size:.85rem;transition:all .3s}
.diff-btn:hover{border-color:#a78bfa;color:#a78bfa}
.diff-btn.active{border-color:#f0b90b;color:#f0b90b;background:rgba(240,185,11,.1)}
.diff-btn.hard.active{border-color:#ff6b35;color:#ff6b35;background:rgba(255,107,53,.1)}

/* ===== GAME AREA ===== */
.game-area{background:linear-gradient(145deg,#141a2e,#1a2238);border:2px solid #2a3350;border-radius:20px;padding:30px;max-width:800px;width:100%;margin:15px 0;min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}

/* BUTTONS */
.btn-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:10px 0}
.btn{padding:12px 28px;border-radius:50px;font-weight:700;cursor:pointer;border:none;font-size:1rem;transition:all .3s;text-decoration:none;display:inline-block;color:inherit}
.btn-primary{background:linear-gradient(135deg,#f0b90b,#ff6b35);color:#0a0e1a}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(240,185,11,.3)}
.btn-secondary{background:transparent;border:2px solid #3a4560;color:#e0e0e0}.btn-secondary:hover{border-color:#f0b90b;color:#f0b90b}
.btn-accent{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff}.btn-accent:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(168,85,247,.3)}
.btn-small{padding:8px 18px;font-size:.85rem}

/* SECTION TITLES */
.section-title{font-size:1.8rem;font-weight:800;color:#f0b90b;text-align:center;margin:12px 0}
.section-sub{color:#8899aa;text-align:center;margin-bottom:16px;font-size:.95rem}

/* CHAR DISPLAY */
.char-display{display:flex;align-items:center;gap:10px;background:#141a2e;border-radius:16px;padding:8px 18px;font-size:.9rem}
.char-display svg{width:36px;height:36px}

/* MEMORY */
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:500px}
.memory-card{aspect-ratio:1;background:linear-gradient(135deg,#1a2238,#2a3350);border:2px solid #3a4560;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2rem;transition:all .3s;user-select:none}
.memory-card.flipped{background:linear-gradient(135deg,#f0b90b,#ff6b35);border-color:#f0b90b;transform:scale(1.05)}
.memory-card.matched{background:linear-gradient(135deg,#059669,#10b981);border-color:#10b981;cursor:default;opacity:.8}

/* MAZE */
#maze-canvas{border-radius:12px;background:#0a0e1a;max-width:100%}
.maze-dpad{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px;gap:4px;margin-top:15px;justify-content:center}
.dpad-btn{background:#1a2238;border:2px solid #3a4560;border-radius:12px;font-size:1.5rem;cursor:pointer;color:#e0e0e0;display:flex;align-items:center;justify-content:center}
.dpad-btn:active{background:#f0b90b;color:#0a0e1a;transform:scale(.9)}

/* TYPING & MATH */
.typing-word{font-size:2.5rem;font-weight:900;color:#f0b90b;margin:20px 0;letter-spacing:2px;transition:color .2s}
.typing-input,.math-input,.scramble-input{background:#141a2e;border:2px solid #3a4560;border-radius:12px;padding:14px 20px;font-size:1.3rem;color:#fff;text-align:center;width:100%;max-width:400px;outline:none}
.typing-input:focus,.math-input:focus,.scramble-input:focus{border-color:#f0b90b}
.typing-timer,.math-timer{font-size:3rem;font-weight:900;color:#ff6b35;margin:10px 0}

/* FIND */
.find-container{position:relative;width:100%;max-width:700px;height:400px;background:linear-gradient(145deg,#0a0e1a,#141a2e);border-radius:16px;overflow:hidden;cursor:crosshair}
.find-laptop-el{position:absolute;font-size:2.5rem;cursor:pointer;z-index:2;animation:laptopPulse 2s ease infinite}
@keyframes laptopPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

/* MATCH */
.match-container{display:flex;gap:40px;flex-wrap:wrap;justify-content:center}
.match-column{display:flex;flex-direction:column;gap:10px}
.match-item{background:#1a2238;border:2px solid #2a3350;border-radius:12px;padding:14px 20px;cursor:pointer;text-align:center;font-size:1.5rem;transition:all .2s;min-width:120px;display:flex;align-items:center;gap:10px;user-select:none}
.match-item:hover{border-color:#f0b90b}
.match-item.selected{border-color:#00d4ff;background:#1a2838;box-shadow:0 0 20px rgba(0,212,255,.2)}
.match-item.matched{border-color:#10b981;background:#0a2a1a;cursor:default;opacity:.7}

/* COLOR PATTERN */
.color-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:350px}
.color-btn{aspect-ratio:1;border-radius:16px;border:3px solid transparent;cursor:pointer;transition:all .15s;min-width:120px}
.color-btn:active,.color-btn.lit{transform:scale(.95);filter:brightness(1.8)}
.color-btn.red{background:#ef4444}.color-btn.red.lit,.color-btn.red:active{box-shadow:0 0 40px rgba(239,68,68,.7)}
.color-btn.blue{background:#3b82f6}.color-btn.blue.lit,.color-btn.blue:active{box-shadow:0 0 40px rgba(59,130,246,.7)}
.color-btn.green{background:#10b981}.color-btn.green.lit,.color-btn.green:active{box-shadow:0 0 40px rgba(16,185,129,.7)}
.color-btn.yellow{background:#f0b90b}.color-btn.yellow.lit,.color-btn.yellow:active{box-shadow:0 0 40px rgba(240,185,11,.7)}

/* BUG SQUASH */
.bug-area{position:relative;width:100%;max-width:700px;height:400px;background:linear-gradient(145deg,#0a0e1a,#141a2e);border-radius:16px;overflow:hidden;cursor:crosshair;border:2px solid #2a3350}
.bug{position:absolute;font-size:2.2rem;cursor:pointer;z-index:2;animation:bugWiggle .5s ease infinite alternate;pointer-events:auto}
@keyframes bugWiggle{0%{transform:rotate(-5deg)}100%{transform:rotate(5deg)}}
.splat{position:absolute;font-size:2rem;pointer-events:none;animation:splatFade .6s ease forwards;z-index:3}
@keyframes splatFade{0%{opacity:1;transform:scale(.5)}100%{opacity:0;transform:scale(1.5)}}

/* MATH */
.math-problem{font-size:3rem;font-weight:900;color:#f0b90b;margin:20px 0}
.math-input{max-width:250px}.math-input:focus{border-color:#ec4899}

/* SCRAMBLE */
.scramble-word{font-size:2.8rem;font-weight:900;color:#a855f7;margin:20px 0;letter-spacing:6px}
.scramble-input:focus{border-color:#a855f7}
.scramble-hint{color:#8899aa;font-style:italic;margin-top:8px;cursor:pointer}

/* OVERLAYS */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center}
.overlay-box{background:linear-gradient(145deg,#141a2e,#1a2238);border:2px solid #f0b90b;border-radius:24px;padding:36px;text-align:center;max-width:520px;width:90%;animation:popIn .4s ease;max-height:90vh;overflow-y:auto}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.overlay-emoji{font-size:5rem;margin-bottom:12px}
.overlay-title{font-size:1.8rem;font-weight:900;color:#f0b90b;margin-bottom:8px}
.overlay-sub{color:#10b981;font-size:1.2rem;margin:8px 0}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:linear-gradient(145deg,#141a2e,#1a2238);border:2px solid #f0b90b;border-radius:20px;padding:28px;max-width:420px;width:90%;text-align:center;animation:popIn .3s ease}
.modal-box h3{color:#f0b90b;margin-bottom:10px;font-size:1.3rem}.modal-box p{color:#8899aa;margin-bottom:14px;font-size:.9rem}

/* LEADERBOARD & BADGES */
.leaderboard-table{width:100%;max-width:600px;border-collapse:collapse;margin:15px 0}
.leaderboard-table th{background:#141a2e;color:#f0b90b;padding:12px;text-align:left;border-bottom:2px solid #2a3350}
.leaderboard-table td{padding:12px;border-bottom:1px solid #1a2238}
.leaderboard-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.rank-1{color:#f0b90b;font-weight:900}.rank-2{color:#c0c0c0}.rank-3{color:#cd7f32}
.badge-grid{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:15px 0}
.badge-item{background:#141a2e;border:2px solid #2a3350;border-radius:16px;padding:18px;text-align:center;width:140px}
.badge-item.earned{border-color:#f0b90b;background:linear-gradient(145deg,#1a1e32,#1f2840)}
.badge-item.locked{opacity:.4;filter:grayscale(1)}
.badge-emoji{font-size:2.5rem;display:block;margin-bottom:6px}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* REACTION RUSH */
.react-area{width:100%;max-width:500px;height:300px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;cursor:pointer;transition:background .1s;user-select:none}
.react-area.waiting{background:#ef4444;color:#fff}
.react-area.ready{background:#10b981;color:#fff}
.react-area.clicked{background:#f0b90b;color:#0a0e1a}

/* TRIVIA QUIZ */
.trivia-q{font-size:1.2rem;color:#e0e0e0;text-align:center;margin:15px 0;line-height:1.5;max-width:500px}
.trivia-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px;width:100%}
.trivia-btn{padding:14px;border-radius:12px;border:2px solid #3a4560;background:#1a2238;color:#e0e0e0;cursor:pointer;font-size:.95rem;transition:all .2s;text-align:left}
.trivia-btn:hover{border-color:#f0b90b;background:#1f2840}
.trivia-btn.correct{background:#059669!important;border-color:#10b981!important;color:#fff!important}
.trivia-btn.wrong{background:#991b1b!important;border-color:#ef4444!important;color:#fff!important}

/* CODE BREAKER */
.code-display{font-size:3rem;font-weight:900;color:#f0b90b;margin:15px 0;letter-spacing:12px;font-family:monospace}
.code-input{background:#141a2e;border:2px solid #3a4560;border-radius:12px;padding:14px 20px;font-size:1.3rem;color:#fff;text-align:center;width:100%;max-width:200px;outline:none;letter-spacing:8px}
.code-input:focus{border-color:#a855f7}
.code-hint{color:#ff6b35;font-size:.95rem;margin:6px 0;min-height:24px}

@media(max-width:600px){
  .memory-grid{grid-template-columns:repeat(3,1fr)}.game-area{padding:15px}
  .color-grid{max-width:250px}.color-btn{min-width:80px}
  .math-problem{font-size:2.2rem}.scramble-word{font-size:2rem;letter-spacing:4px}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- ===== HUB SCREEN ===== -->
<div class="screen active" id="hub-screen">
  <div class="char-display" id="hub-char-display"></div>
  <div class="hub-top">
    <div class="stat-badge"><span>⭐</span><span class="sv" id="hub-points">0</span>pts</div>
    <div class="stat-badge"><span>🪙</span><span class="sv" id="hub-coins">0</span>coins</div>
    <div style="text-align:center">
      <div style="font-size:.85rem;color:#8899aa">Level <span id="hub-level">1</span>: <span id="hub-level-name">School Explorer</span></div>
      <div class="level-bar"><div class="level-bar-fill" id="hub-level-bar" style="width:0%"></div></div>
      <span style="font-size:.75rem;color:#8899aa"><span id="hub-exp">0</span>/<span id="hub-exp-max">100</span> XP</span>
    </div>
  </div>
  <h2 class="section-title">🎯 Choose Your Challenge</h2>
  <p class="section-sub" style="color:#ec4899;font-size:.8rem">💜 Liana's Creation</p>
  <div class="diff-picker">
    <button class="diff-btn active" data-diff="easy" onclick="setDifficulty('easy',this)">🟢 Easy</button>
    <button class="diff-btn" data-diff="medium" onclick="setDifficulty('medium',this)">🟡 Medium</button>
    <button class="diff-btn hard" data-diff="hard" onclick="setDifficulty('hard',this)">🔴 Hard (2x pts)</button>
  </div>
  <div class="game-area">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;width:100%">
      <button class="btn btn-primary btn-small" onclick="startMiniGame('memory')">🧠 Forget-Me-Not</button>
      <button class="btn btn-primary btn-small" onclick="startMiniGame('maze')">🔀 A-Maze-Ing</button>
      <button class="btn btn-primary btn-small" onclick="startMiniGame('typing')">⌨️ Keyboard SMASH!</button>
      <button class="btn btn-primary btn-small" onclick="startMiniGame('find')">🔍 Hide & Geek</button>
      <button class="btn btn-primary btn-small" onclick="startMiniGame('match')">🔗 Icon-ic Confusion</button>
      <button class="btn btn-accent btn-small" onclick="startMiniGame('math')">🧮 Math Rush</button>
      <button class="btn btn-accent btn-small" onclick="startMiniGame('colorpat')">🌈 Color Pattern</button>
      <button class="btn btn-accent btn-small" onclick="startMiniGame('scramble')">🔤 Word Scramble</button>
      <button class="btn btn-accent btn-small" onclick="startMiniGame('bug')">🐛 Bug Squash</button>
      <button class="btn btn-accent btn-small" onclick="startMiniGame('trivia')">❓ Trivia Quiz</button>
      <button class="btn btn-accent btn-small" onclick="startMiniGame('react')">⚡ Reaction Rush</button>
      <button class="btn btn-accent btn-small" onclick="startMiniGame('codebreak')">🔐 Code Breaker</button>
    </div>
  </div>
  <div class="btn-bar">
    <a href="questions.html" class="btn btn-secondary">💬 Ask Questions</a>
    <button class="btn btn-secondary" onclick="showScreen('badges-screen');renderBadges()">🏅 Badges</button>
    <button class="btn btn-secondary" onclick="showScreen('leaderboard-screen');renderLeaderboard()">🏆 Leaderboard</button>
    <button class="btn btn-secondary" onclick="showConfirm('Reset ALL progress?',resetProgress)">🔄 Reset</button>
    <a href="index.html" class="btn btn-secondary">🦸 Change Character</a>
  </div>
</div>

<!-- BADGES -->
<div class="screen" id="badges-screen">
  <h2 class="section-title">🏅 Your Badges</h2>
  <div class="badge-grid" id="badge-grid"></div>
  <div class="btn-bar"><button class="btn btn-secondary" onclick="showScreen('hub-screen')">← Back</button></div>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="leaderboard-screen">
  <h2 class="section-title">🏆 Leaderboard</h2>
  <table class="leaderboard-table" id="leaderboard-table">
    <thead><tr><th>#</th><th>Player</th><th>Character</th><th>Points</th><th>Level</th></tr></thead><tbody></tbody>
  </table>
  <div class="btn-bar"><button class="btn btn-secondary" onclick="showScreen('hub-screen')">← Back</button></div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="game-screen">
  <h2 class="section-title" id="game-title">Challenge</h2>
  <div class="game-area" id="game-play-area"></div>
  <div class="btn-bar"><button class="btn btn-secondary" onclick="quitGame()">🏠 Quit</button></div>
</div>

<script>
// ===== SVG =====
const CHAR_SVGS = {
  sunny: `<svg viewBox="0 0 100 100"><defs><radialGradient id="sg" cx="50%" cy="50%"><stop offset="0%" stop-color="#fff7c2"/><stop offset="100%" stop-color="#f0b90b"/></radialGradient></defs><circle cx="50" cy="50" r="24" fill="url(#sg)" stroke="#e6a800" stroke-width="2"/><g stroke="#f0b90b" stroke-width="3" stroke-linecap="round"><line x1="50" y1="14" x2="50" y2="20"/><line x1="50" y1="80" x2="50" y2="86"/><line x1="14" y1="50" x2="20" y2="50"/><line x1="80" y1="50" x2="86" y2="50"/><line x1="24" y1="24" x2="29" y2="29"/><line x1="71" y1="71" x2="76" y2="76"/><line x1="76" y1="24" x2="71" y2="29"/><line x1="29" y1="76" x2="24" y2="71"/></g><circle cx="42" cy="46" r="3" fill="#e6a800"/><circle cx="58" cy="46" r="3" fill="#e6a800"/><path d="M42 56 Q50 64 58 56" fill="none" stroke="#e6a800" stroke-width="2" stroke-linecap="round"/></svg>`,
  storm: `<svg viewBox="0 0 100 100"><defs><radialGradient id="stg" cx="50%" cy="40%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/></radialGradient></defs><path d="M25 55 Q30 35 50 35 Q55 20 65 30 Q80 28 82 42 Q92 45 88 55 Q90 62 82 62 L28 62 Q18 62 25 55Z" fill="url(#stg)" stroke="#6d28d9" stroke-width="2"/><path d="M48 64 L44 76 L52 74 L46 88" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="38" cy="52" r="2" fill="#4c1d95"/><circle cx="52" cy="48" r="2" fill="#4c1d95"/><path d="M40 56 Q45 59 50 56" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  thunder: `<svg viewBox="0 0 100 100"><defs><linearGradient id="thg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#67e8f9"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><path d="M48 5 L58 5 L28 50 L42 50 L32 95 L72 40 L55 40 L66 20 L48 5Z" fill="url(#thg)" stroke="#0891b2" stroke-width="2" stroke-linejoin="round"/><circle cx="52" cy="32" r="2.5" fill="#fff"/><circle cx="45" cy="45" r="2.5" fill="#fff"/></svg>`,
  rain: `<svg viewBox="0 0 100 100"><defs><linearGradient id="rag" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs><ellipse cx="48" cy="34" rx="20" ry="14" fill="url(#rag)" stroke="#2563eb" stroke-width="2"/><line x1="38" y1="55" x2="34" y2="68" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><line x1="50" y1="58" x2="46" y2="76" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><line x1="62" y1="54" x2="58" y2="70" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><circle cx="40" cy="30" r="2.5" fill="#1e40af"/><circle cx="55" cy="28" r="2.5" fill="#1e40af"/><path d="M42 36 Q48 40 54 36" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round"/></svg>`
};
const CHARACTERS = [
  { id:'sunny', name:'Sunny', emoji:'☀️', color:'#f0b90b', desc:'Bright & optimistic', power:'+5 bonus points per challenge' },
  { id:'storm', name:'Storm', emoji:'🌪️', color:'#a855f7', desc:'Intense & powerful', power:'2x points on first try' },
  { id:'thunder', name:'Thunder', emoji:'⚡', color:'#00d4ff', desc:'Quick & energetic', power:'Extra 15s on timed games' },
  { id:'rain', name:'Rain', emoji:'🌧️', color:'#60a5fa', desc:'Calm & persistent', power:'1 free hint per game' },
];
const LEVELS = [
  { name:'School Explorer', minXP:0 },{ name:'Tech Detective', minXP:100 },
  { name:'Coding Apprentice', minXP:300 },{ name:'Digital Master', minXP:600 },
  { name:'School Legend', minXP:1000 }
];
const BADGES = [
  { id:'first_win', name:'First Victory', emoji:'🌟', cond: s => s.totalXP > 0 },
  { id:'fast_learner', name:'Fast Learner', emoji:'⚡', cond: s => s.totalXP >= 50 },
  { id:'memory_master', name:'Memory Master', emoji:'🧠', cond: s => s.totalXP >= 150 },
  { id:'quiz_champion', name:'Quiz Champion', emoji:'🏆', cond: s => s.totalXP >= 200 },
  { id:'speed_typer', name:'Speed Typer', emoji:'⌨️', cond: s => s.totalXP >= 350 },
  { id:'coding_hero', name:'Coding Hero', emoji:'💻', cond: s => s.totalXP >= 500 },
  { id:'collector', name:'Coin Collector', emoji:'🪙', cond: s => s.coins >= 50 },
  { id:'ds_expert', name:'School Expert', emoji:'🎓', cond: s => s.totalXP >= 1000 },
  { id:'math_whiz', name:'Math Whiz', emoji:'🧮', cond: s => s.totalXP >= 800 },
  { id:'pattern_genius', name:'Pattern Genius', emoji:'🌈', cond: s => s.totalXP >= 650 },
  { id:'bug_hunter', name:'Bug Hunter', emoji:'🐛', cond: s => s.totalXP >= 900 },
  { id:'wordsmith', name:'Word Smith', emoji:'📝', cond: s => s.totalXP >= 750 },
];
const GAME_NAMES = {
  memory:'🧠 Forget-Me-Not',maze:'🔀 A-Maze-Ing',typing:'⌨️ Keyboard SMASH!',
  find:'🔍 Hide & Geek',match:'🔗 Icon-ic Confusion',math:'🧮 Math Rush',
  colorpat:'🌈 Color Pattern',scramble:'🔤 Word Scramble',bug:'🐛 Bug Squash',
  trivia:'❓ Trivia Quiz',react:'⚡ Reaction Rush',codebreak:'🔐 Code Breaker'
};

// ===== STATE =====
function ls(){try{return JSON.parse(localStorage.getItem('ds_state_v3')||'{}')}catch(e){return{}}}
function ss(d){localStorage.setItem('ds_state_v3',JSON.stringify(d))}
function getState(){let s=ls();if(!s.questionTokens)s.questionTokens=1;if(!s.difficulty)s.difficulty='medium';if(!s.points)s.points=0;if(!s.coins)s.coins=0;if(!s.totalXP)s.totalXP=0;if(!s.badges)s.badges={};return s}

// ===== SCREEN =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  updateHubStats();
}

// ===== DIFFICULTY =====
function setDifficulty(diff,btn){
  let s=getState();s.difficulty=diff;ss(s);
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
}
function dm(){return getState().difficulty==='hard'?2:getState().difficulty==='easy'?0.7:1}
function dt(b){return getState().difficulty==='hard'?Math.floor(b*0.75):getState().difficulty==='easy'?Math.floor(b*1.8):Math.floor(b*1.15)}
function dc(b){return getState().difficulty==='hard'?Math.ceil(b*1.3):getState().difficulty==='easy'?Math.floor(b*0.5):b}
function dth(b){return getState().difficulty==='hard'?Math.ceil(b*1.2):getState().difficulty==='easy'?Math.floor(b*0.4):Math.floor(b*0.75)}

// ===== LEVELS =====
function getLevel(s){for(let i=LEVELS.length-1;i>=0;i--){if(s.totalXP>=LEVELS[i].minXP)return i+1}return 1}
function getLevelName(s){for(let i=LEVELS.length-1;i>=0;i--){if(s.totalXP>=LEVELS[i].minXP)return LEVELS[i].name}return LEVELS[0].name}
function getXPProgress(s){const l=getLevel(s);const cur=LEVELS[l-1].minXP;const nxt=l<LEVELS.length?LEVELS[l].minXP:cur+500;if(nxt===cur)return 100;return Math.min(100,Math.round(((s.totalXP-cur)/(nxt-cur))*100))}

function updateHubStats(){
  const s=getState();
  ['hub-points','hub-coins','hub-level','hub-level-name','hub-level-bar','hub-exp','hub-exp-max'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    if(id==='hub-points')el.textContent=s.points;
    else if(id==='hub-coins')el.textContent=s.coins;
    else if(id==='hub-level')el.textContent=getLevel(s);
    else if(id==='hub-level-name')el.textContent=getLevelName(s);
    else if(id==='hub-level-bar')el.style.width=getXPProgress(s)+'%';
    else if(id==='hub-exp')el.textContent=s.totalXP;
    else if(id==='hub-exp-max')el.textContent=getLevel(s)<LEVELS.length?LEVELS[getLevel(s)].minXP:'∞';
  });
  // Char display
  const c=s.character||CHARACTERS[0];
  document.querySelectorAll('.char-display').forEach(el=>{
    el.innerHTML=`${CHAR_SVGS[c.id]} <div><strong style="color:${c.color}">${c.name}</strong><br><small style="color:#8899aa">${c.desc}</small></div>`;
  });
}

// ===== POINTS =====
function awardPoints(pts,coins){
  let s=getState(),bonus=0;
  if(s.character&&s.character.id==='sunny')bonus=5;
  if(s.character&&s.character.id==='storm'&&!s._stormUsed){bonus=pts;s._stormUsed=true}
  let total=pts+bonus;
  if(s.difficulty==='hard')total=Math.floor(total*2);
  s.points+=total;s.totalXP+=total;s.coins+=(coins||0);
  checkBadges(s);addToLB(s);ss(s);updateHubStats();
  return total;
}
function checkBadges(s){
  let changed=false;
  for(const b of BADGES){if(!s.badges[b.id]&&b.cond(s)){s.badges[b.id]=true;changed=true}}
  if(changed)ss(s);
}
function addToLB(s){
  const lb=JSON.parse(localStorage.getItem('ds_lb_v3')||'[]');
  const ex=lb.findIndex(e=>e.name===s.playerName);
  const entry={name:s.playerName||'Player',character:s.character?s.character.name:'Unknown',points:s.points,level:getLevel(s),levelName:getLevelName(s),xp:s.totalXP};
  if(ex>=0)lb[ex]=entry;else lb.push(entry);
  lb.sort((a,b)=>b.points-a.points);localStorage.setItem('ds_lb_v3',JSON.stringify(lb.slice(0,50)));
}

// ===== MODAL =====
function showConfirm(msg,cb){
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal-box"><h3>⚠️ Are you sure?</h3><p>${msg}</p><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn btn-primary btn-small" id="cfm-yes">Confirm</button><button class="btn btn-secondary btn-small" id="cfm-no">Cancel</button></div></div>`;
  document.body.appendChild(ov);
  document.getElementById('cfm-yes').onclick=()=>{ov.remove();cb()};
  document.getElementById('cfm-no').onclick=()=>ov.remove();
}

// ===== MINI-GAME ROUTER =====
let mgs={};
function startMiniGame(game){
  mgs={};
  let s=getState();ss(s);
  showScreen('game-screen');
  document.getElementById('game-title').textContent=GAME_NAMES[game]+' ['+s.difficulty.toUpperCase()+']';
  const area=document.getElementById('game-play-area');area.innerHTML='';
  switch(game){
    case 'memory':startMemory(area);break;
    case 'maze':startMaze(area);break;
    case 'typing':startTyping(area);break;
    case 'find':startFind(area);break;
    case 'match':startMatch(area);break;
    case 'math':startMath(area);break;
    case 'colorpat':startColorPat(area);break;
    case 'scramble':startScramble(area);break;
    case 'bug':startBug(area);break;
    case 'trivia':startTrivia(area);break;
    case 'react':startReact(area);break;
    case 'codebreak':startCodeBreak(area);break;
  }
}
function quitGame(){cleanupGame();showScreen('hub-screen')}
function cleanupGame(){
  if(mgs._kh){document.removeEventListener('keydown',mgs._kh);delete mgs._kh}
  if(mgs._t){clearInterval(mgs._t);delete mgs._t}
  if(mgs._st){clearTimeout(mgs._st);delete mgs._st}
  if(mgs._bt){clearInterval(mgs._bt);delete mgs._bt}
}
function handleGameWin(){
  cleanupGame();
  let s=getState();s.questionTokens=(s.questionTokens||0)+1;ss(s);
  const pts=awardPoints(50,10);
  const db=s.difficulty==='hard'?'<br><span style="color:#ff6b35">🔥 HARD MODE — 2x points!</span>':'';
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="overlay-box"><div class="overlay-emoji">🎉</div><div class="overlay-title">CHALLENGE COMPLETE!</div><div class="overlay-sub">+${pts} Points | +10 🪙 Coins | +1 🎫 Token${db}</div><p style="color:#8899aa;margin:8px 0">You have <b style="color:#f0b90b">${s.questionTokens}</b> token(s)!</p><div class="btn-bar"><a href="questions.html?won=1" class="btn btn-primary">💬 Ask a Question</a><button class="btn btn-secondary" onclick="this.closest('.overlay').remove();showScreen('hub-screen')">🏠 Hub</button></div></div>`;
  document.body.appendChild(ov);
}
function handleGameLose(){
  cleanupGame();
  const ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML=`<div class="overlay-box"><div class="overlay-emoji">😔</div><div class="overlay-title">KEEP TRYING!</div><p style="color:#8899aa;margin:8px 0">Practice makes perfect. Try Easy mode!</p><div class="btn-bar"><button class="btn btn-primary" onclick="this.closest('.overlay').remove();startMiniGame(mgs._g)">🔄 Try Again</button><button class="btn btn-secondary" onclick="this.closest('.overlay').remove();showScreen('hub-screen')">🏠 Hub</button></div></div>`;
  document.body.appendChild(ov);
}

// ===== 1. MEMORY =====
function startMemory(area){
  const n=dc(8);const icons=['💻','📱','🖥️','⌨️','🖱️','🎮','🤖','🔌','📡','💾','🔋','🎧'];
  const chosen=icons.slice(0,n);const pairs=[...chosen,...chosen];pairs.sort(()=>Math.random()-.5);
  mgs={_g:'memory',cards:pairs,flipped:[],matched:new Set(),moves:0,lock:false};
  const cols=n<=4?4:Math.ceil(Math.sqrt(pairs.length));
  const grid=document.createElement('div');grid.className='memory-grid';grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  pairs.forEach((icon,i)=>{const c=document.createElement('div');c.className='memory-card';c.dataset.index=i;c.textContent='❓';c.onclick=()=>flipMC(c,i,icon);grid.appendChild(c)});
  area.appendChild(grid);
  const info=document.createElement('p');info.style.cssText='color:#8899aa;margin-top:15px';info.id='mem-info';info.textContent=`Moves: 0 | Pairs: 0/${n}`;area.appendChild(info);
}
function flipMC(card,i,icon){
  if(mgs.lock||mgs.matched.has(i)||mgs.flipped.includes(i))return;
  card.classList.add('flipped');card.textContent=icon;mgs.flipped.push(i);
  if(mgs.flipped.length===2){mgs.moves++;mgs.lock=true;const[a,b]=mgs.flipped;const cards=document.querySelectorAll('.memory-card');
    if(mgs.cards[a]===mgs.cards[b]){mgs.matched.add(a);mgs.matched.add(b);cards[a].classList.add('matched');cards[b].classList.add('matched');mgs.flipped=[];mgs.lock=false;uMI();if(mgs.matched.size===mgs.cards.length)setTimeout(handleGameWin,400)}
    else{setTimeout(()=>{cards[a].classList.remove('flipped');cards[b].classList.remove('flipped');cards[a].textContent='❓';cards[b].textContent='❓';mgs.flipped=[];mgs.lock=false;uMI()},800)}uMI()}
}
function uMI(){const el=document.getElementById('mem-info');if(el)el.textContent=`Moves: ${mgs.moves} | Pairs: ${mgs.matched.size/2}/${mgs.cards.length/2}`}

// ===== 2. MAZE =====
function startMaze(area){
  const COLS=15,ROWS=11;const cs=Math.min(40,Math.floor(Math.min(window.innerWidth-80,600)/COLS));
  const grid=Array(ROWS).fill(null).map(()=>Array(COLS).fill(1));
  const visited=Array(ROWS).fill(null).map(()=>Array(COLS).fill(false));
  function carve(cx,cy){grid[cy][cx]=0;visited[cy][cx]=true;const dirs=[[0,-2],[2,0],[0,2],[-2,0]];dirs.sort(()=>Math.random()-.5);for(const[dx,dy]of dirs){const nx=cx+dx,ny=cy+dy;if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&!visited[ny][nx]){grid[cy+dy/2][cx+dx/2]=0;carve(nx,ny)}}}
  carve(1,1);
  const pp=[1,1],ep=[COLS-2,ROWS-2];grid[ep[1]][ep[0]]=2;
  const passages=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]===0)passages.push([c,r]);
  passages.sort(()=>Math.random()-.5);
  const cc=dc(3);const coins=[];for(const[c,r]of passages){if(coins.length>=cc)break;const tc=coins.some(([cc2,cr2])=>Math.abs(c-cc2)+Math.abs(r-cr2)<3)||(c===1&&r===1)||(c===ep[0]&&r===ep[1]);if(!tc)coins.push([c,r])}
  mgs={_g:'maze',grid,pp,ep,coins,collected:0,moves:0,cs,COLS,ROWS};
  const canvas=document.createElement('canvas');canvas.id='maze-canvas';canvas.width=COLS*cs+20;canvas.height=ROWS*cs+20;area.appendChild(canvas);
  const dpad=document.createElement('div');dpad.className='maze-dpad';
  dpad.innerHTML='<div></div><button class="dpad-btn" onclick="mM(0,-1)">▲</button><div></div><button class="dpad-btn" onclick="mM(-1,0)">◀</button><div></div><button class="dpad-btn" onclick="mM(1,0)">▶</button><div></div><button class="dpad-btn" onclick="mM(0,1)">▼</button><div></div>';
  area.appendChild(dpad);
  const info=document.createElement('p');info.style.cssText='color:#8899aa;margin-top:10px';info.id='maze-info';info.textContent='Find 🏁!';area.appendChild(info);
  drawMaze(canvas);
  const kh=e=>{if(!document.getElementById('game-screen').classList.contains('active'))return;switch(e.key){case'ArrowUp':case'w':case'W':e.preventDefault();mM(0,-1);break;case'ArrowDown':case's':case'S':e.preventDefault();mM(0,1);break;case'ArrowLeft':case'a':case'A':e.preventDefault();mM(-1,0);break;case'ArrowRight':case'd':case'D':e.preventDefault();mM(1,0);break}};
  document.addEventListener('keydown',kh);mgs._kh=kh;
}
function mM(dx,dy){
  const m=mgs;const nx=m.pp[0]+dx,ny=m.pp[1]+dy;
  if(nx<0||nx>=m.COLS||ny<0||ny>=m.ROWS)return;if(m.grid[ny][nx]===1)return;
  m.pp=[nx,ny];m.moves++;m.coins=m.coins.filter(([cc,cr])=>{if(cc===nx&&cr===ny){m.collected++;return false}return true});
  drawMaze(document.getElementById('maze-canvas'));
  document.getElementById('maze-info').textContent=`Moves: ${m.moves} | Coins: ${m.collected}/${m.coins.length+m.collected}`;
  if(nx===m.ep[0]&&ny===m.ep[1]){cleanupGame();setTimeout(handleGameWin,300)}
}
function drawMaze(canvas){
  if(!canvas)return;const ctx=canvas.getContext('2d'),m=mgs,cs=m.cs,ox=10,oy=10;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<m.ROWS;r++)for(let c=0;c<m.COLS;c++){const x=ox+c*cs,y=oy+r*cs;if(m.grid[r][c]===1){ctx.fillStyle='#1a2238';ctx.fillRect(x,y,cs,cs)}else{ctx.fillStyle='#0a1226';ctx.fillRect(x,y,cs,cs);ctx.strokeStyle='#1a2a40';ctx.strokeRect(x,y,cs,cs)}}
  ctx.fillStyle='#10b981';ctx.font=`${cs*.7}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  const[ex,ey]=m.ep;ctx.fillText('🏁',ox+ex*cs+cs/2,oy+ey*cs+cs/2);
  for(const[cc,cr]of m.coins){ctx.font=`${cs*.6}px sans-serif`;ctx.fillText('🪙',ox+cc*cs+cs/2,oy+cr*cs+cs/2)}
  const s=getState();const c=s.character||CHARACTERS[0];
  const[px,py]=m.pp;const px2=ox+px*cs+cs/2,py2=oy+py*cs+cs/2;
  const glow=ctx.createRadialGradient(px2,py2,cs*.1,px2,py2,cs*.6);glow.addColorStop(0,c.color);glow.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(px2,py2,cs*.6,0,Math.PI*2);ctx.fill();
  ctx.font=`${cs*.7}px sans-serif`;ctx.fillText(c.emoji,px2,py2);
}

// ===== 3. TYPING =====
function startTyping(area){
  const easy=['code','data','web','bug','app','byte','bit','ram','cpu','net','css','html'];
  const med=['server','python','router','cloud','debug','array','loop','syntax','binary','script','cache'];
  const hard=['algorithm','javascript','database','encapsulation','polymorphism','firewall','framework','compiler','inheritance','middleware'];
  let words=getState().difficulty==='hard'?hard:getState().difficulty==='easy'?easy:[...med,...hard.slice(0,6)];
  const time=dt(30),threshold=dth(5);
  mgs={_g:'typing',words,score:0,timeLeft:time,idx:0,threshold};
  mgs.cw=words[Math.floor(Math.random()*words.length)];
  area.innerHTML=`<div style="color:#ff6b35;font-size:.85rem;margin-bottom:5px">Score ${threshold}+ to win!</div><div class="typing-timer" id="tt">${time}</div><div class="typing-word" id="tw">${mgs.cw}</div><input class="typing-input" id="ti" placeholder="Type the word..." autocomplete="off" autofocus><p style="color:#8899aa;margin-top:10px" id="ts">Score: 0 | Words: 0 | Need: ${threshold}</p>`;
  mgs._t=setInterval(()=>{mgs.timeLeft--;document.getElementById('tt').textContent=mgs.timeLeft;if(mgs.timeLeft<=0){clearInterval(mgs._t);const inp=document.getElementById('ti');if(inp)inp.disabled=true;if(mgs.score>=threshold)handleGameWin();else handleGameLose()}},1000);
  setTimeout(()=>{const inp=document.getElementById('ti');if(inp){inp.focus();inp.addEventListener('input',tC)}},100);
}
function tC(e){
  const v=e.target.value.trim().toLowerCase();
  if(v===mgs.cw.toLowerCase()){mgs.score++;mgs.idx++;e.target.value='';mgs.cw=mgs.words[Math.floor(Math.random()*mgs.words.length)];document.getElementById('tw').textContent=mgs.cw;document.getElementById('ts').textContent=`Score: ${mgs.score} | Words: ${mgs.idx} | Need: ${mgs.threshold}`;document.getElementById('tw').style.color='#10b981';setTimeout(()=>document.getElementById('tw').style.color='#f0b90b',200)}
}

// ===== 4. FIND =====
function startFind(area){
  const W=700,H=400;const mC=getState().difficulty==='hard'?15:getState().difficulty==='easy'?50:30;
  const lx=50+Math.random()*(W-150),ly=50+Math.random()*(H-150);

  const dC=getState().difficulty==='hard'?20:15;
  mgs={_g:'find',lx,ly,clicks:0,found:false,maxClicks:mC};
  const decoys=[];for(let i=0;i<dC;i++){let dx,dy;do{dx=30+Math.random()*(W-80);dy=30+Math.random()*(H-80)}while(Math.abs(dx-lx)<80&&Math.abs(dy-ly)<80);decoys.push({x:dx,y:dy,icon:icons[i%icons.length],size:1.3+Math.random()*.8})}
  const cont=document.createElement('div');cont.className='find-container';cont.style.maxWidth=W+'px';cont.style.height=H+'px';
  decoys.forEach(d=>{const el=document.createElement('span');el.style.cssText=`position:absolute;left:${d.x}px;top:${d.y}px;font-size:${d.size}rem;opacity:.5;pointer-events:none`;el.textContent=d.icon;cont.appendChild(el)});
  const laptop=document.createElement('span');laptop.className='find-laptop-el';laptop.style.cssText=`left:${lx}px;top:${ly}px`;laptop.textContent='💻';
  laptop.onclick=e=>{e.stopPropagation();if(mgs.found)return;mgs.found=true;mgs.clicks++;document.getElementById('fc').textContent=`Found in ${mgs.clicks} clicks!`;cont.style.border='3px solid #10b981';setTimeout(handleGameWin,600)};
  cont.appendChild(laptop);
  cont.onclick=()=>{if(mgs.found)return;mgs.clicks++;document.getElementById('fc').textContent=`Clicks: ${mgs.clicks}`;if(mgs.clicks>=mgs.maxClicks){laptop.style.opacity='1';laptop.style.fontSize='4rem';cont.style.border='2px solid #ff6b35'}};
  area.appendChild(cont);
  const cd=document.createElement('p');cd.id='fc';cd.style.cssText='color:#8899aa;margin-top:10px';cd.textContent='Clicks: 0';area.appendChild(cd);
  area.appendChild(Object.assign(document.createElement('p'),{style:'color:#8899aa;margin-top:4px;font-size:.8rem',textContent:`💡 After ${mC} clicks the laptop gets easier!`}));
}

// ===== 5. MATCH =====
function startMatch(area){
  const all=[{icon:'💻',name:'Laptop'},{icon:'🖥️',name:'Desktop'},{icon:'⌨️',name:'Keyboard'},{icon:'🖱️',name:'Mouse'},{icon:'🤖',name:'Robot'},{icon:'🔌',name:'Plug'},{icon:'📱',name:'Phone'},{icon:'🌐',name:'Internet'},{icon:'📡',name:'Satellite'},{icon:'💾',name:'Disk'},{icon:'🔋',name:'Battery'},{icon:'🎧',name:'Headphones'}];
  const n=dc(6);const pairs=all.slice(0,n);
  mgs={_g:'match',pairs,selI:null,selN:null,matched:new Set()};
  const si=[...pairs].sort(()=>Math.random()-.5),sn=[...pairs].sort(()=>Math.random()-.5);
  const cont=document.createElement('div');cont.className='match-container';
  cont.innerHTML=`<div class="match-column"><h4 style="color:#f0b90b;text-align:center;margin-bottom:8px">Icons</h4>${si.map(p=>`<div class="match-item icon-item" data-id="${p.name}" onclick="sMI('${p.name}',this)">${p.icon}</div>`).join('')}</div><div class="match-column"><h4 style="color:#00d4ff;text-align:center;margin-bottom:8px">Names</h4>${sn.map(p=>`<div class="match-item name-item" data-id="${p.name}" onclick="sMN('${p.name}',this)">📛 ${p.name}</div>`).join('')}</div>`;
  area.appendChild(cont);
  const st=document.createElement('p');st.style.cssText='color:#8899aa;margin-top:15px';st.id='ms';st.textContent='Click an icon, then its matching name!';area.appendChild(st);
}
function sMI(n,el){if(mgs.matched.has(n))return;document.querySelectorAll('.icon-item').forEach(i=>i.classList.remove('selected'));el.classList.add('selected');mgs.selI={name:n,el};cM()}
function sMN(n,el){if(mgs.matched.has(n))return;document.querySelectorAll('.name-item').forEach(i=>i.classList.remove('selected'));el.classList.add('selected');mgs.selN={name:n,el};cM()}
function cM(){if(!mgs.selI||!mgs.selN)return;
  if(mgs.selI.name===mgs.selN.name){mgs.matched.add(mgs.selI.name);mgs.selI.el.classList.add('matched');mgs.selN.el.classList.add('matched');mgs.selI.el.classList.remove('selected');mgs.selN.el.classList.remove('selected');mgs.selI=null;mgs.selN=null;document.getElementById('ms').textContent=`Matched: ${mgs.matched.size}/${mgs.pairs.length}`;if(mgs.matched.size===mgs.pairs.length)setTimeout(handleGameWin,400)}
  else{setTimeout(()=>{mgs.selI.el.classList.remove('selected');mgs.selN.el.classList.remove('selected');mgs.selI=null;mgs.selN=null;document.getElementById('ms').textContent='❌ Wrong!';setTimeout(()=>document.getElementById('ms').textContent='Click an icon, then its matching name!',1000)},300)}
}

// ===== 6. MATH RUSH =====
function startMath(area){
  const ops=['+','-','×'];const time=dt(45),threshold=dth(8);
  mgs={_g:'math',score:0,timeLeft:time,threshold,ops};
  area.innerHTML=`<div style="color:#ff6b35;font-size:.85rem;margin-bottom:5px">Score ${threshold}+ to win!</div><div class="typing-timer" id="mt">${time}</div><div class="math-problem" id="mp">--</div><input class="math-input" id="mi" placeholder="Answer" autocomplete="off" autofocus><p style="color:#8899aa;margin-top:10px" id="msc">Score: 0/${threshold}</p><p style="color:#8899aa;font-size:.8rem;margin-top:6px">Press Enter</p>`;
  mgs._t=setInterval(()=>{mgs.timeLeft--;document.getElementById('mt').textContent=mgs.timeLeft;if(mgs.timeLeft<=0){clearInterval(mgs._t);const inp=document.getElementById('mi');if(inp)inp.disabled=true;if(mgs.score>=threshold)handleGameWin();else handleGameLose()}},1000);
  setTimeout(()=>{gMP();const inp=document.getElementById('mi');if(inp){inp.focus();inp.addEventListener('keydown',mKC)}},100);
}
function gMP(){let a,b,op,ans;const s=getState();
  if(s.difficulty==='hard'){a=Math.floor(Math.random()*90)+10;b=Math.floor(Math.random()*90)+10}
  else if(s.difficulty==='easy'){a=Math.floor(Math.random()*20)+1;b=Math.floor(Math.random()*10)+1}
  else{a=Math.floor(Math.random()*50)+5;b=Math.floor(Math.random()*30)+5}
  op=mgs.ops[Math.floor(Math.random()*mgs.ops.length)];
  if(op==='+')ans=a+b;else if(op==='-'){if(b>a)[a,b]=[b,a];ans=a-b}else ans=a*b;
  mgs.ca=ans;document.getElementById('mp').textContent=`${a} ${op} ${b} = ?`;
  document.getElementById('msc').textContent=`Score: ${mgs.score}/${mgs.threshold}`;
}
function mKC(e){if(e.key==='Enter'){e.preventDefault();const inp=document.getElementById('mi');const v=parseInt(inp.value.trim());if(v===mgs.ca){mgs.score++;document.getElementById('mp').style.color='#10b981';setTimeout(()=>document.getElementById('mp').style.color='#f0b90b',200);if(mgs.score>=mgs.threshold){inp.disabled=true;clearInterval(mgs._t);setTimeout(handleGameWin,400);return}}else{document.getElementById('msc').textContent=`❌ ${mgs.ca} | Score: ${mgs.score}/${mgs.threshold}`;setTimeout(()=>document.getElementById('msc').textContent=`Score: ${mgs.score}/${mgs.threshold}`,600)}inp.value='';gMP()}}

// ===== 7. COLOR PATTERN =====
function startColorPat(area){
  const colors=['red','blue','green','yellow'];const sl=dth(4)+1;
  mgs={_g:'colorpat',colors,seq:[],pi:0,ie:false,round:0,mr:sl};
  area.innerHTML=`<div style="color:#ff6b35;font-size:.85rem;margin-bottom:10px">Watch the pattern, then repeat! Round 1/${sl}</div><div class="color-grid">${colors.map(c=>`<div class="color-btn ${c}" id="cb-${c}" onclick="cPC('${c}')"></div>`).join('')}</div><p style="color:#8899aa;margin-top:12px;min-height:24px" id="cs">👀 Watch...</p>`;
  setTimeout(()=>aTS(),500);
}
function aTS(){mgs.ie=false;mgs.seq.push(mgs.colors[Math.floor(Math.random()*mgs.colors.length)]);mgs.round++;document.getElementById('cs').textContent=`👀 Round ${mgs.round}/${mgs.mr} — Watch!`;pS()}
function pS(){mgs.seq.forEach((c,i)=>{setTimeout(()=>{const btn=document.getElementById('cb-'+c);btn.classList.add('lit');setTimeout(()=>btn.classList.remove('lit'),350);if(i===mgs.seq.length-1)setTimeout(()=>{mgs.pi=0;mgs.ie=true;document.getElementById('cs').textContent=`🎮 Your turn! (${mgs.seq.length} steps)`},500)},i*600)})}
function cPC(color){if(!mgs.ie)return;const btn=document.getElementById('cb-'+color);btn.classList.add('lit');setTimeout(()=>btn.classList.remove('lit'),200);if(mgs.seq[mgs.pi]!==color){mgs.ie=false;document.getElementById('cs').textContent='❌ Wrong!';setTimeout(handleGameLose,800);return}mgs.pi++;if(mgs.pi===mgs.seq.length){if(mgs.round>=mgs.mr){document.getElementById('cs').textContent='✅ Perfect!';setTimeout(handleGameWin,400)}else{document.getElementById('cs').textContent='✅ Good! Next...';setTimeout(()=>aTS(),800)}}}

// ===== 8. WORD SCRAMBLE =====
function startScramble(area){
  const easy=[['laptop','A portable computer'],['mouse','A computer pointing device'],['keyboard','You type on this'],['screen','The display'],['internet','World Wide Web'],['coding','Writing instructions for computers']];
  const hard=[['algorithm','Step-by-step problem-solving procedure'],['database','Organized collection of data'],['compiler','Translates code to machine language'],['encryption','Converting data into secret code'],['bandwidth','Data transfer capacity'],['firewall','Network security system']];
  let words=getState().difficulty==='hard'?hard:getState().difficulty==='easy'?easy.slice(0,6):[...easy.slice(0,4),...hard.slice(0,4)];
  const time=dt(60),threshold=dth(3);
  mgs={_g:'scramble',words,idx:0,score:0,timeLeft:time,threshold,hu:0};mgs.cw=words[Math.floor(Math.random()*words.length)];mgs.sw=sW(mgs.cw[0]);
  area.innerHTML=`<div style="color:#ff6b35;font-size:.85rem;margin-bottom:5px">Unscramble ${threshold}+ words to win!</div><div class="typing-timer" id="st">${time}</div><div class="scramble-word" id="sw">${mgs.sw}</div><input class="scramble-input" id="si" placeholder="Unscramble..." autocomplete="off" autofocus><p style="color:#8899aa;margin-top:10px" id="ss">Score: 0/${threshold}</p><div class="scramble-hint" id="sh" onclick="uSH()">💡 Need a hint? Click! (0 used)</div>`;
  mgs._t=setInterval(()=>{mgs.timeLeft--;document.getElementById('st').textContent=mgs.timeLeft;if(mgs.timeLeft<=0){clearInterval(mgs._t);const inp=document.getElementById('si');if(inp)inp.disabled=true;if(mgs.score>=threshold)handleGameWin();else handleGameLose()}},1000);
  setTimeout(()=>{const inp=document.getElementById('si');if(inp){inp.focus();inp.addEventListener('input',sC)}},100);
}
function sW(w){let a=w.split('');for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}const s=a.join('');return s===w?sW(w):s}
function sC(e){const v=e.target.value.trim().toLowerCase();if(v===mgs.cw[0].toLowerCase()){mgs.score++;e.target.value='';mgs.cw=mgs.words[Math.floor(Math.random()*mgs.words.length)];mgs.sw=sW(mgs.cw[0]);document.getElementById('sw').textContent=mgs.sw;document.getElementById('ss').textContent=`Score: ${mgs.score}/${mgs.threshold}`;document.getElementById('sw').style.color='#10b981';setTimeout(()=>document.getElementById('sw').style.color='#a855f7',200)}}
function uSH(){mgs.hu++;document.getElementById('sh').innerHTML=`💡 <b>Hint:</b> ${mgs.cw[1]} (${mgs.hu} hints used)`}

// ===== 9. BUG SQUASH =====
function startBug(area){
  const time=dt(25),threshold=dth(8);
  const bugs=['🐛','🦗','🐜','🪲','🕷️','🦟'];
  mgs={_g:'bug',score:0,timeLeft:time,threshold,bugs,active:true};
  area.innerHTML=`<div style="color:#ff6b35;font-size:.85rem;margin-bottom:5px">Squash ${threshold}+ bugs to win!</div><div class="typing-timer" id="bt">${time}</div><div class="bug-area" id="ba"></div><p style="color:#8899aa;margin-top:10px" id="bs">Squashed: 0/${threshold}</p>`;
  sB();mgs._bt=setInterval(sB,getState().difficulty==='hard'?600:getState().difficulty==='easy'?1500:1000);
  mgs._t=setInterval(()=>{mgs.timeLeft--;document.getElementById('bt').textContent=mgs.timeLeft;if(mgs.timeLeft<=0){clearInterval(mgs._t);clearInterval(mgs._bt);mgs.active=false;if(mgs.score>=threshold)handleGameWin();else handleGameLose()}},1000);
  document.getElementById('ba').addEventListener('click',function(e){if(!mgs.active)return;const bugEl=e.target.closest('.bug');if(bugEl&&bugEl.dataset.alive==='1'){bugEl.dataset.alive='0';mgs.score++;document.getElementById('bs').textContent=`Squashed: ${mgs.score}/${mgs.threshold}`;const splat=document.createElement('span');splat.className='splat';splat.textContent='💥';splat.style.left=bugEl.style.left;splat.style.top=bugEl.style.top;document.getElementById('ba').appendChild(splat);setTimeout(()=>splat.remove(),600);bugEl.remove();if(mgs.score>=mgs.threshold){mgs.active=false;clearInterval(mgs._t);clearInterval(mgs._bt);setTimeout(handleGameWin,400)}}});
}
function sB(){if(!mgs.active)return;const area=document.getElementById('ba');if(!area)return;const maxBugs=getState().difficulty==='hard'?6:getState().difficulty==='easy'?3:4;const existing=area.querySelectorAll('.bug');if(existing.length>=maxBugs){const oldest=area.querySelector('.bug');if(oldest&&oldest.dataset.alive==='1')oldest.remove()}const bug=document.createElement('span');bug.className='bug';bug.dataset.alive='1';bug.textContent=mgs.bugs[Math.floor(Math.random()*mgs.bugs.length)];bug.style.left=(5+Math.random()*85)+'%';bug.style.top=(5+Math.random()*85)+'%';bug.style.fontSize=(1.8+Math.random()*1.5)+'rem';area.appendChild(bug);setTimeout(()=>{if(bug.dataset.alive==='1')bug.remove()},getState().difficulty==='hard'?2500:getState().difficulty==='easy'?5000:3500)}

function answerTrivia(i,btn){
  if(mgs.answered)return;mgs.answered=true;
  const q=mgs.qs[mgs.idx];

  btns[q.a].classList.add('correct');
  if(i===q.a){mgs.score++;document.getElementById('tscr').textContent=`✅ Correct! Score: ${mgs.score}/${mgs.threshold}`;
    if(mgs.score>=mgs.threshold){mgs.idx++;setTimeout(()=>handleGameWin(),600);return}
  }else{btn.classList.add('wrong');document.getElementById('tscr').textContent=`❌ Wrong! Score: ${mgs.score}/${mgs.threshold}`}
  mgs.idx++;
  setTimeout(()=>{
    if(mgs.score>=mgs.threshold)return;
    if(mgs.idx>=mgs.qs.length&&mgs.score<mgs.threshold){handleGameLose();return}
    const area=document.getElementById('game-play-area');showTriviaQ(area)
  },800)
}

// ===== 11. REACTION RUSH =====
function startReact(area){
  const threshold=dth(5);
  mgs={_g:'react',score:0,threshold,phase:'waiting',timeout:null,startTime:0};
  area.innerHTML=`<div style="color:#ff6b35;font-size:.85rem;margin-bottom:5px">Score ${threshold}+ to win!</div><div class="react-area waiting" id="ra">🔴 WAIT...</div><p style="color:#8899aa;margin-top:10px" id="rscr">Score: 0/${threshold} | Best: --ms</p><p style="color:#8899aa;font-size:.8rem;margin-top:4px">Click when GREEN!</p>`;
  startReactRound();
}
function startReactRound(){
  const ra=document.getElementById('ra');if(!ra)return;
  ra.className='react-area waiting';ra.textContent='🔴 WAIT...';
  const delay=800+Math.random()*2500;
  ra.onclick=()=>{if(mgs.phase==='waiting'){clearTimeout(mgs.timeout);ra.textContent='⚠️ TOO EARLY!';ra.className='react-area waiting';setTimeout(startReactRound,1000)}};
  mgs.timeout=setTimeout(()=>{mgs.phase='ready';mgs.startTime=Date.now();ra.className='react-area ready';ra.textContent='🟢 CLICK NOW!';
    ra.onclick=()=>{if(mgs.phase!=='ready')return;mgs.phase='clicked';const rt=Date.now()-mgs.startTime;mgs.score++;ra.className='react-area clicked';ra.textContent=`⚡ ${rt}ms!`;document.getElementById('rscr').textContent=`Score: ${mgs.score}/${mgs.threshold} | Best: ${Math.min(rt,mgs.best||9999)}ms`;mgs.best=Math.min(rt,mgs.best||9999);
      if(mgs.score>=mgs.threshold)setTimeout(handleGameWin,400);else setTimeout(startReactRound,800)};
  },delay);
}

// ===== 12. CODE BREAKER =====
function startCodeBreak(area){
  const threshold=dth(3);
  const digits=getState().difficulty==='hard'?4:getState().difficulty==='easy'?2:3;
  const code=[];for(let i=0;i<digits;i++)code.push(Math.floor(Math.random()*10));
  mgs={_g:'codebreak',code,digits,score:0,threshold,hints:[]};
  area.innerHTML=`<div style="color:#ff6b35;font-size:.85rem;margin-bottom:5px">Guess ${threshold}+ codes to win!</div><div class="code-display" id="cdisp">${'?'.repeat(digits)}</div><input class="code-input" id="ci" placeholder="${'0'.repeat(digits)}" autocomplete="off" autofocus maxlength="${digits}" onkeydown="if(event.key==='Enter')guessCode()"><p class="code-hint" id="ch">Enter ${digits} digits & press Enter</p><p style="color:#8899aa;margin-top:6px" id="cbscr">Cracked: ${mgs.score}/${mgs.threshold} | Attempts: 0</p>`;
  setTimeout(()=>{const inp=document.getElementById('ci');if(inp)inp.focus()},100);
}
function guessCode(){
  const inp=document.getElementById('ci');if(!inp)return;
  const v=inp.value.trim();if(v.length!==mgs.digits)return;
  const guess=v.split('').map(Number);inp.value='';mgs.attempts=(mgs.attempts||0)+1;
  let correct=0,close=0;
  const usedG=[...mgs.code],usedC=[...guess];
  for(let i=0;i<mgs.digits;i++){if(guess[i]===mgs.code[i]){correct++;usedG[i]=-1;usedC[i]=-2}}
  for(let i=0;i<mgs.digits;i++){if(usedC[i]===-2)continue;const idx=usedG.indexOf(guess[i]);if(idx!==-1){close++;usedG[idx]=-1}}
  if(correct===mgs.digits){mgs.score++;document.getElementById('cdisp').textContent=mgs.code.join('');document.getElementById('cdisp').style.color='#10b981';document.getElementById('ch').textContent='✅ CRACKED!';document.getElementById('cbscr').textContent=`Cracked: ${mgs.score}/${mgs.threshold} | Attempts: ${mgs.attempts}`;setTimeout(()=>{document.getElementById('cdisp').style.color='#f0b90b';
    if(mgs.score>=mgs.threshold){handleGameWin();return}
    const digits=mgs.digits;const code=[];for(let i=0;i<digits;i++)code.push(Math.floor(Math.random()*10));mgs.code=code;document.getElementById('cdisp').textContent='?'.repeat(digits);document.getElementById('ch').textContent=`Enter ${digits} digits`;const inp2=document.getElementById('ci');if(inp2)inp2.focus()},600)}
  else{let hint='';if(correct>0)hint+=correct+' correct digit'+(correct>1?'s':'')+' in right spot. ';if(close>0)hint+=close+' correct digit'+(close>1?'s':'')+' in wrong spot.';if(!hint)hint='No correct digits. Try again!';document.getElementById('ch').textContent=hint;document.getElementById('cbscr').textContent=`Cracked: ${mgs.score}/${mgs.threshold} | Attempts: ${mgs.attempts}`}}

function resetProgress(){
  let s=getState();s.points=0;s.coins=0;s.totalXP=0;s.badges={};s.questionTokens=1;s.difficulty='medium';
  ss(s);updateHubStats();showScreen('hub-screen');
}
function initBg(){
  const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+.3,b:Math.random()*.5+.3,s:Math.random()*.015+.005});
  const big=[];for(let i=0;i<8;i++)big.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,phase:Math.random()*Math.PI*2,speed:Math.random()*.02+.01});
  let t=0;
  function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);t+=0.01;
    for(const s of stars){s.y-=s.s;if(s.y<-5){s.y=canvas.height+5;s.x=Math.random()*canvas.width}const f=0.4+0.6*Math.abs(Math.sin(t*2+s.x*.01));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.b*f})`;ctx.fill()}
    for(const b of big){const f2=0.4+0.6*Math.abs(Math.sin(t*3+b.phase));ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);g.addColorStop(0,`rgba(180,200,255,${f2*.5})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fill();ctx.fillStyle=`rgba(255,255,255,${f2})`;ctx.arc(b.x,b.y,b.r*.6,0,Math.PI*2);ctx.fill()}
    if(Math.random()<.003){const sx=Math.random()*canvas.width,sy=Math.random()*canvas.height*.3;ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+60,sy+30);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+70,sy+35);ctx.stroke()}
    requestAnimationFrame(anim)}anim();
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
}

// ===== INIT =====
function init(){
  updateHubStats();
  const s=getState();
  const db=document.querySelector(`.diff-btn[data-diff="${s.difficulty}"]`);
  if(db)db.classList.add('active');
  // Auto-start game if URL param
  const params=new URLSearchParams(window.location.search);
  const g=params.get('game');
  if(g){window.history.replaceState({},'',window.location.pathname);startMiniGame(g)}
}
init();initBg();
console.log('🇽🇰 Page 4/4 — Game Hub (12 games!)');
