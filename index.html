<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shkolla Digjitale - Choose Your Guide</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#020010;color:#f0e6ff;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 30% 20%,rgba(100,60,255,.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 60%,rgba(0,180,255,.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(255,100,180,.06) 0%,transparent 40%),radial-gradient(ellipse at 20% 70%,rgba(0,200,255,.05) 0%,transparent 50%);pointer-events:none;z-index:0}

.logo{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;background:linear-gradient(135deg,#f0b90b,#ff6b35,#00d4ff,#a855f7,#ec4899);background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 3s ease infinite;text-align:center;margin-bottom:6px;position:relative;z-index:1}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sub{color:#c4b5fd;text-align:center;margin-bottom:30px;position:relative;z-index:1;font-size:1.1rem;letter-spacing:2px}

.char-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;max-width:800px;width:100%;margin:15px 0;position:relative;z-index:1}
.char-card{background:linear-gradient(145deg,#141a2e,#1a2238);border:2px solid #2a3350;border-radius:20px;padding:20px 12px;cursor:pointer;text-align:center;transition:all .3s}
.char-card:hover{transform:translateY(-5px);border-color:#f0b90b;box-shadow:0 10px 30px rgba(240,185,11,.15)}
.char-card.selected{border-color:#f0b90b;box-shadow:0 0 30px rgba(240,185,11,.3);background:linear-gradient(145deg,#1a1e32,#1f2840)}
.char-card svg{width:80px;height:80px;margin-bottom:8px}
.char-card h3{font-size:1.2rem;font-weight:700;margin-top:4px}
.char-card .desc{font-size:.8rem;color:#8899aa;margin-top:4px}
.char-card .power{font-size:.7rem;color:#ff6b35;margin-top:3px;font-style:italic}

.btn{display:inline-block;padding:16px 48px;font-size:1.2rem;font-weight:700;border:none;border-radius:50px;cursor:pointer;transition:all .3s;letter-spacing:1px;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#f0b90b,#ff6b35);color:#0a0e1a;margin-right:10px}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(240,185,11,.4)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:transparent;border:2px solid #3a4560;color:#e0e0e0}
.btn-secondary:hover{border-color:#f0b90b;color:#f0b90b}
.btn-bar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0;position:relative;z-index:1}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

@media(max-width:600px){.char-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<h1 class="logo">SHKOLLA DIGJITALE</h1>
<p class="sub">🌟 LIANA'S CREATION 🌟</p>
<p style="color:#a78bfa;text-align:center;margin-bottom:16px;position:relative;z-index:1;font-size:.95rem">Enter your name, then pick a character!</p>

<div style="position:relative;z-index:1;display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;max-width:500px;width:100%">
  <input id="fname" placeholder="First Name" maxlength="20" style="flex:1;min-width:150px;background:#141a2e;border:2px solid #3a4560;border-radius:12px;padding:12px 16px;font-size:1rem;color:#fff;outline:none;text-align:center" oninput="checkReady()">
  <input id="lname" placeholder="Last Name" maxlength="20" style="flex:1;min-width:150px;background:#141a2e;border:2px solid #3a4560;border-radius:12px;padding:12px 16px;font-size:1rem;color:#fff;outline:none;text-align:center" oninput="checkReady()">
</div>

<div class="char-grid" id="char-grid"></div>

<div class="btn-bar">
  <button class="btn btn-secondary" onclick="goBack()">← Back</button>
  <button class="btn btn-primary" id="confirm-btn" onclick="confirmChar()" disabled>Confirm & Continue →</button>
</div>

<script>
const CHAR_SVGS = {
  sunny: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="sg" cx="50%" cy="50%"><stop offset="0%" stop-color="#fff7c2"/><stop offset="100%" stop-color="#f0b90b"/></radialGradient></defs><circle cx="50" cy="50" r="24" fill="url(#sg)" stroke="#e6a800" stroke-width="2"/><g stroke="#f0b90b" stroke-width="3" stroke-linecap="round"><line x1="50" y1="14" x2="50" y2="20"/><line x1="50" y1="80" x2="50" y2="86"/><line x1="14" y1="50" x2="20" y2="50"/><line x1="80" y1="50" x2="86" y2="50"/><line x1="24" y1="24" x2="29" y2="29"/><line x1="71" y1="71" x2="76" y2="76"/><line x1="76" y1="24" x2="71" y2="29"/><line x1="29" y1="76" x2="24" y2="71"/></g><circle cx="42" cy="46" r="3" fill="#e6a800"/><circle cx="58" cy="46" r="3" fill="#e6a800"/><path d="M42 56 Q50 64 58 56" fill="none" stroke="#e6a800" stroke-width="2" stroke-linecap="round"/></svg>`,
  storm: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="stg" cx="50%" cy="40%"><stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#7c3aed"/></radialGradient></defs><path d="M25 55 Q30 35 50 35 Q55 20 65 30 Q80 28 82 42 Q92 45 88 55 Q90 62 82 62 L28 62 Q18 62 25 55Z" fill="url(#stg)" stroke="#6d28d9" stroke-width="2"/><path d="M48 64 L44 76 L52 74 L46 88" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M62 35 L60 40 M68 38 L66 43 M71 42 L68 45" fill="none" stroke="#ddd6fe" stroke-width="1.5" stroke-linecap="round"/><circle cx="38" cy="52" r="2" fill="#4c1d95"/><circle cx="52" cy="48" r="2" fill="#4c1d95"/><path d="M40 56 Q45 59 50 56" fill="none" stroke="#4c1d95" stroke-width="1.5" stroke-linecap="round"/></svg>`,
  thunder: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="thg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#67e8f9"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><path d="M48 5 L58 5 L28 50 L42 50 L32 95 L72 40 L55 40 L66 20 L48 5Z" fill="url(#thg)" stroke="#0891b2" stroke-width="2" stroke-linejoin="round"/><circle cx="52" cy="32" r="2.5" fill="#fff"/><circle cx="45" cy="45" r="2.5" fill="#fff"/></svg>`,
  rain: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="rag" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs><ellipse cx="48" cy="34" rx="20" ry="14" fill="url(#rag)" stroke="#2563eb" stroke-width="2"/><line x1="38" y1="55" x2="34" y2="68" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><line x1="50" y1="58" x2="46" y2="76" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><line x1="62" y1="54" x2="58" y2="70" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><circle cx="40" cy="30" r="2.5" fill="#1e40af"/><circle cx="55" cy="28" r="2.5" fill="#1e40af"/><path d="M42 36 Q48 40 54 36" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round"/></svg>`
};
const CHARACTERS = [
  { id:'sunny', name:'Sunny', emoji:'☀️', color:'#f0b90b', desc:'Bright & optimistic', power:'+5 bonus points per challenge' },
  { id:'storm', name:'Storm', emoji:'🌪️', color:'#a855f7', desc:'Intense & powerful', power:'2x points on first try' },
  { id:'thunder', name:'Thunder', emoji:'⚡', color:'#00d4ff', desc:'Quick & energetic', power:'Extra 15s on timed games' },
  { id:'rain', name:'Rain', emoji:'🌧️', color:'#60a5fa', desc:'Calm & persistent', power:'1 free hint per game' },
];
let selected = null;
function checkReady(){
  const fn=document.getElementById('fname').value.trim();
  const ln=document.getElementById('lname').value.trim();
  document.getElementById('confirm-btn').disabled = !(fn && ln && selected);
}
function loadState(){try{return JSON.parse(localStorage.getItem('ds_state_v3')||'{}')}catch(e){return{}}}
function saveState(s){localStorage.setItem('ds_state_v3',JSON.stringify(s))}

function renderChars(){
  const g=document.getElementById('char-grid');
  g.innerHTML=CHARACTERS.map(c=>`
    <div class="char-card" id="char-${c.id}" onclick="selectChar('${c.id}')">
      ${CHAR_SVGS[c.id]}
      <h3 style="color:${c.color}">${c.emoji} ${c.name}</h3>
      <div class="desc">${c.desc}</div>
      <div class="power">⚡ ${c.power}</div>
    </div>`).join('');
  const s=loadState();
  if(s.character) selectChar(s.character.id);
}
function selectChar(id){
  document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('char-'+id).classList.add('selected');
  selected=CHARACTERS.find(c=>c.id===id);
  checkReady();
}
function confirmChar(){
  if(!selected)return;
  const fn=document.getElementById('fname').value.trim();
  const ln=document.getElementById('lname').value.trim();
  if(!fn||!ln)return;
  const s=loadState();
  s.character=selected;
  s.firstName=fn;
  s.lastName=ln;
  s.playerName=fn+' '+ln;
  saveState(s);
  window.location.href='instructions.html';
}
function goBack(){
  if(document.referrer)window.history.back();else window.location.href='index.html';
}

// BG Animation
function initBg(){
  const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+.3,b:Math.random()*.5+.3,s:Math.random()*.015+.005});
  const big=[];for(let i=0;i<8;i++)big.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+1,phase:Math.random()*Math.PI*2,speed:Math.random()*.02+.01});
  let t=0;
  function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);t+=0.01;
    for(const s of stars){s.y-=s.s;if(s.y<-5){s.y=canvas.height+5;s.x=Math.random()*canvas.width}const f=0.4+0.6*Math.abs(Math.sin(t*2+s.x*.01));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.b*f})`;ctx.fill()}
    for(const b of big){const f2=0.4+0.6*Math.abs(Math.sin(t*3+b.phase));ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);g.addColorStop(0,`rgba(180,200,255,${f2*.5})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fill();ctx.fillStyle=`rgba(255,255,255,${f2})`;ctx.arc(b.x,b.y,b.r*.6,0,Math.PI*2);ctx.fill()}
    // occasional shooting star
    if(Math.random()<.003){const sx=Math.random()*canvas.width,sy=Math.random()*canvas.height*.3;ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+60,sy+30);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+70,sy+35);ctx.stroke()}
    requestAnimationFrame(anim)}anim();
  window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
}
renderChars();initBg();
console.log('🇽🇰 Page 1/4 — Choose Your Character');
</script>
</body>
</html>
